services:
  - type: web
    name: hyperise
    runtime: static
    buildCommand: cd site && rm -rf src/content/wiki && cp -r ../wiki src/content/wiki && npm ci && npm run build
    staticPublishPath: site/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: 20
