name: Moderate Inbox

on:
  issue_comment:
    types: [created]

jobs:
  moderate:
    runs-on: ubuntu-latest
    if: startsWith(github.event.comment.body, '/approve') || startsWith(github.event.comment.body, '/reject')
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.5.x"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Approve or reject
        id: moderate
        run: |
          if [[ "${{ github.event.comment.body }}" == /approve* ]]; then
            uv run python scripts/preprocess.py approve --issue-id ${{ github.event.issue.number }}
            LABEL="approved"
          else
            uv run python scripts/preprocess.py reject --issue-id ${{ github.event.issue.number }}
            LABEL="rejected"
          fi
          echo "label=$LABEL" >> $GITHUB_OUTPUT
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

      - name: Commit changes
        run: |
          git config user.name "hyperise-bot"
          git config user.email "bot@hyperise.dev"
          git add inbox/
          git diff --cached --quiet || git commit -m "auto: moderate issue #${{ github.event.issue.number }}"
          git push

      - name: Update issue
        uses: actions/github-script@v7
        with:
          script: |
            const label = "${{ steps.moderate.outputs.label }}";
            github.rest.issues.addLabels({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: [label]
            });
            if (label === "approved") {
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: "Одобрено. Будет обработано агентом в ближайший запуск."
              });
            } else {
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: "Отклонено."
              });
              github.rest.issues.update({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: "closed"
              });
            }
