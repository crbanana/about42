name: Daily Pipeline

on:
  schedule:
    - cron: '0 3 * * *'  # 03:00 UTC daily
  workflow_dispatch:

jobs:
  pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.5.x"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Run pipeline
        run: uv run python -m agents.pipeline
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}

      - name: Commit and push changes
        run: |
          git config user.name "hyperise-bot"
          git config user.email "bot@hyperise.dev"
          git add wiki/ site/src/content/articles/
          git diff --cached --quiet || git commit -m "auto: content update $(date -I)"
          git push
